<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- White rounded square base matching the actual app icon -->
  <rect width="120" height="120" rx="26" fill="white"/>

  <!-- Teal gradient background inset -->
  <defs>
    <linearGradient id="tealGrad" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00cfc7"/>
      <stop offset="100%" stop-color="#007a76"/>
    </linearGradient>
    <linearGradient id="purpleAccent" x1="60" y1="10" x2="60" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6b3fa0"/>
      <stop offset="100%" stop-color="#4b2d7a"/>
    </linearGradient>
  </defs>

  <!-- Cart body -->
  <path d="M22 30h10l14 42a4 4 0 0 0 4 3.2h38a4 4 0 0 0 3.9-3L100 36H36"
        stroke="url(#tealGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cart wheels -->
  <circle cx="52" cy="86" r="6" fill="url(#tealGrad)"/>
  <circle cx="82" cy="86" r="6" fill="url(#tealGrad)"/>

  <!-- Subtle purple accent bar at top of cart body (brand touch) -->
  <rect x="36" y="46" width="60" height="4" rx="2" fill="url(#purpleAccent)" opacity="0.5"/>
</svg>
